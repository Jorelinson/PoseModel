<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Detector de Poses · Hand Signal AI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=DM+Mono:wght@300;400;500&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;1,9..144,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">

  <!-- TensorFlow.js + Teachable Machine Pose -->
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@1.3.1/dist/tf.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/pose@0.8/dist/teachablemachine-pose.min.js"></script>
</head>
<body>

  <!-- Texture overlay -->
  <div class="grain"></div>

  <!-- Loading overlay -->
  <div id="loadingOverlay">
    <div class="loading-inner">
      <div class="loader-ring"></div>
      <p class="loader-text">Cargando modelo<span class="dots">...</span></p>
    </div>
  </div>

  <div class="wrapper">

    <!-- ── HEADER ── -->
    <header>
      <div class="header-left">
        <div class="logo-mark">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="20" cy="20" r="18" stroke="currentColor" stroke-width="1.5"/>
            <path d="M13 28 L13 16 M13 16 C13 13 17 13 17 16 L17 22 M17 22 C17 19 21 19 21 22 L21 28 M21 22 C21 19 25 19 25 22 L25 28" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="header-text">
          <h1>Hand Signal <em>AI</em></h1>
          <p class="subtitle">Detector de poses · PoseNet · Teachable Machine</p>
        </div>
      </div>
      
    </header>

    <!-- ── MAIN GRID ── -->
    <div class="grid">

      <!-- LEFT: Camera + controls -->
      <div class="col-main">

        <!-- Camera panel -->
        <div class="card card-camera">
          <div class="card-label">
            <span class="label-dot" id="statusDot"></span>
            <span id="statusText">ESPERANDO INPUT</span>
          </div>

          <div class="camera-area" id="cameraArea">
            <!-- Corner brackets -->
            <span class="corner tl"></span>
            <span class="corner tr"></span>
            <span class="corner bl"></span>
            <span class="corner br"></span>

            <div class="idle-state" id="idleState">
              <div class="idle-icon">
                <svg viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect x="8" y="16" width="48" height="36" rx="4" stroke="currentColor" stroke-width="1.5"/>
                  <circle cx="32" cy="34" r="8" stroke="currentColor" stroke-width="1.5"/>
                  <circle cx="32" cy="34" r="3" fill="currentColor" opacity="0.4"/>
                  <rect x="26" y="10" width="12" height="6" rx="2" stroke="currentColor" stroke-width="1.5"/>
                </svg>
              </div>
              <p>Activa la cámara o sube una imagen<br>para detectar poses</p>
            </div>

            <video id="video" autoplay muted playsinline></video>
            <img id="imagePreview" alt="Preview" />
            <canvas id="canvas"></canvas>
            <canvas id="skeletonCanvas"></canvas>
          </div>

          <!-- Upload zone -->
          <label class="upload-zone" id="uploadZone" for="fileInput">
            <svg class="upload-icon" viewBox="0 0 24 24" fill="none">
              <path d="M12 16V8M12 8L9 11M12 8L15 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M20 16.5A3.5 3.5 0 0 0 16.5 13H15.26A8 8 0 1 0 6 20.9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
            <span>Arrastra una imagen aquí · <strong>o haz clic</strong></span>
            <input type="file" id="fileInput" accept="image/*" />
          </label>

          <!-- Controls -->
          <div class="controls">
            <button class="btn btn-primary" id="btnCamera">
              <svg viewBox="0 0 20 20" fill="none">
                <circle cx="10" cy="10" r="3" fill="currentColor"/>
                <path d="M10 2a8 8 0 100 16A8 8 0 0010 2z" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              Activar Cámara
            </button>
            <button class="btn btn-outline" id="btnAnalyze" disabled>
              <svg viewBox="0 0 20 20" fill="none">
                <path d="M9 3H5a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M13 3h4v4M17 3L9 11" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
              </svg>
              Analizar imagen
            </button>
            <button class="btn btn-ghost" id="btnStop" disabled>
              <svg viewBox="0 0 20 20" fill="none">
                <rect x="4" y="4" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
              </svg>
              Detener
            </button>
          </div>

          <!-- Status strip -->
          <div class="status-strip" id="statusStrip">
            <span class="strip-pulse" id="stripPulse"></span>
            <span id="stripText">Modelo listo · Selecciona un modo para comenzar</span>
          </div>
        </div>

      </div>

      <!-- RIGHT: Results + legend -->
      <div class="col-side">

        <!-- Result card -->
        <div class="card card-result">
          <div class="card-label">
            <span class="label-dot dot-warm"></span>
            RESULTADO
          </div>

          <div class="result-display">
            <div class="result-emoji" id="resultEmoji">—</div>
            <div class="result-info">
              <div class="result-tag">Pose detectada</div>
              <div class="result-name idle" id="resultName">Sin detección</div>
              <div class="result-conf" id="resultConfidence">Confianza: —</div>
            </div>
          </div>

          <div class="conf-track">
            <div class="conf-fill" id="confidenceBar"></div>
          </div>

          <!-- Probability bars -->
          <div class="prob-list" id="probList">
            <!-- filled by JS -->
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast"></div>

  <script src="../javascript/script.js"></script>
</body>
</html>
